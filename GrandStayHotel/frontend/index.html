<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Stay Hotel – Sign In</title>
<link rel="stylesheet" href="css/style.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0a1628;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .bg-hotel {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #0a1628 0%, #1a2f55 50%, #0d1e3d 100%);
  }
  .stars { position: absolute; inset: 0; overflow: hidden; }
  .star {
    position: absolute; background: white; border-radius: 50%;
    animation: twinkle 3s infinite alternate;
  }
  @keyframes twinkle { 0% { opacity: 0.3; } 100% { opacity: 1; } }
  .hotel-silhouette {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 700px; height: 280px;
    background: #1a0f05;
    clip-path: polygon(0% 100%, 0% 40%, 5% 40%, 5% 20%, 10% 20%, 10% 40%, 15% 40%, 15% 100%,
      20% 100%, 20% 30%, 25% 30%, 25% 100%, 30% 100%, 30% 35%, 35% 35%, 35% 100%,
      40% 100%, 40% 25%, 45% 10%, 50% 10%, 55% 25%, 60% 25%, 60% 100%,
      65% 100%, 65% 30%, 70% 30%, 70% 100%, 75% 100%, 75% 35%, 80% 35%, 80% 100%,
      85% 100%, 85% 25%, 90% 25%, 90% 40%, 95% 40%, 95% 100%);
    opacity: 0.6;
  }
  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 50px 45px;
    width: 440px;
    position: relative;
    z-index: 10;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  }
  .logo {
    text-align: center;
    margin-bottom: 35px;
  }
  .logo h1 {
    color: #f5c842;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .logo p { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 5px; }
  .tabs {
    display: flex;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 30px;
  }
  .tab {
    flex: 1; padding: 10px; text-align: center;
    border-radius: 8px; cursor: pointer;
    color: rgba(255,255,255,0.5);
    font-size: 14px; font-weight: 600;
    transition: all 0.3s;
    border: none; background: none;
  }
  .tab.active {
    background: #f5c842;
    color: #0a1628;
  }
  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .form-group input, .form-group select {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 13px 16px;
    color: white;
    font-size: 15px;
    outline: none;
    transition: all 0.3s;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: #f5c842;
    background: rgba(245,200,66,0.08);
  }
  .form-group select option { background: #1a2f55; color: white; }
  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, #f5c842, #e8a000);
    color: #0a1628;
    font-size: 16px;
    font-weight: 700;
    padding: 14px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 5px;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(245,200,66,0.4); }
  .links { text-align: center; margin-top: 20px; }
  .links a {
    color: #f5c842;
    text-decoration: none;
    font-size: 13px;
    cursor: pointer;
  }
  .links a:hover { text-decoration: underline; }
  .alert {
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 14px;
    display: none;
  }
  .alert.error { background: rgba(220,53,69,0.2); border: 1px solid rgba(220,53,69,0.4); color: #ff6b7a; }
  .alert.success { background: rgba(40,167,69,0.2); border: 1px solid rgba(40,167,69,0.4); color: #5fdd80; }
  .admin-badge {
    display: inline-block;
    background: rgba(220,53,69,0.2);
    border: 1px solid rgba(220,53,69,0.4);
    color: #ff6b7a;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .hidden { display: none !important; }
  .pw-wrap { position: relative; }
  .pw-wrap input { padding-right: 45px; }
  .pw-toggle {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer;
    font-size: 18px;
  }
</style>
</head>
<body>
<div class="bg-hotel"></div>
<div class="stars" id="stars"></div>

<div class="card">
  <div class="logo">
    <h1>🏨 Grand Stay Hotel</h1>
    <p>Luxury & Comfort at its Best — Est. 2000</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('customer')">Customer Login</button>
    <button class="tab" onclick="switchTab('admin')">Admin <span class="admin-badge">Staff</span></button>
  </div>

  <div id="alert" class="alert"></div>

  <!-- CUSTOMER LOGIN -->
  <div id="customerTab">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="custEmail" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="custPassword" placeholder="••••••••">
        <button class="pw-toggle" onclick="togglePw('custPassword', this)">👁</button>
      </div>
    </div>
    <button class="btn-primary" onclick="customerLogin()">Sign In</button>
    <div class="links">
      <a onclick="showPage('signup.html')">Don't have an account? Sign Up</a>
      &nbsp;|&nbsp;
      <a onclick="showPage('forgot.html')">Forgot Password?</a>
    </div>
  </div>

  <!-- ADMIN LOGIN -->
  <div id="adminTab" class="hidden">
    <div class="form-group">
      <label>Admin Email</label>
      <input type="email" id="adminEmail" placeholder="admin@grandstayhotel.com">
    </div>
    <div class="form-group">
      <label>Admin Password</label>
      <div class="pw-wrap">
        <input type="password" id="adminPassword" placeholder="••••••••">
        <button class="pw-toggle" onclick="togglePw('adminPassword', this)">👁</button>
      </div>
    </div>
    <button class="btn-primary" onclick="adminLogin()">Admin Sign In</button>
    <div class="links">
      <a onclick="showPage('forgot.html')">Forgot Password?</a>
    </div>
  </div>
</div>

<script>
const API = 'https://hotel-backend-a4ag.onrender.com/api';

// Generate stars
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `width:${Math.random()*3+1}px;height:${Math.random()*3+1}px;
    left:${Math.random()*100}%;top:${Math.random()*80}%;
    animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s`;
  starsEl.appendChild(s);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='customer')||(i===1&&tab==='admin')));
  document.getElementById('customerTab').classList.toggle('hidden', tab!=='customer');
  document.getElementById('adminTab').classList.toggle('hidden', tab!=='admin');
  hideAlert();
}

function showAlert(msg, type) {
  const a = document.getElementById('alert');
  a.textContent = msg;
  a.className = `alert ${type}`;
  a.style.display = 'block';
}
function hideAlert() { document.getElementById('alert').style.display = 'none'; }

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function showPage(url) { window.location.href = url; }

async function adminLogin() {
  const email = document.getElementById('adminEmail').value.trim();
  const password = document.getElementById('adminPassword').value;
  if (!email || !password) { showAlert('Please fill in all fields.', 'error'); return; }
  try {
    const res = await fetch(`${API}/admin/login`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('role', 'admin');
      localStorage.setItem('name', data.name);
      localStorage.setItem('email', email);
      window.location.href = 'admin.html';
    } else {
      showAlert(data.message, 'error');
    }
  } catch(e) {
    showAlert('Cannot connect to server. Make sure backend is running.', 'error');
  }
}

async function customerLogin() {
  const email = document.getElementById('custEmail').value.trim();
  const password = document.getElementById('custPassword').value;
  if (!email || !password) { showAlert('Please fill in all fields.', 'error'); return; }
  try {
    const res = await fetch(`${API}/customer/login`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('role', 'customer');
      localStorage.setItem('name', data.name);
      localStorage.setItem('email', data.email);
      window.location.href = 'customer.html';
    } else {
      showAlert(data.message, 'error');
    }
  } catch(e) {
    showAlert('Cannot connect to server. Make sure backend is running.', 'error');
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const adminVisible = !document.getElementById('adminTab').classList.contains('hidden');
    adminVisible ? adminLogin() : customerLogin();
  }
});
</script>
</body>
</html>
