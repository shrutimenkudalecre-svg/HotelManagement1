<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Stay Hotel – Forgot Password</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a4a1a 0%, #2d7a2d 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: rgba(10,10,10,0.85);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 45px 40px;
    width: 440px;
    box-shadow: 0 30px 70px rgba(0,0,0,0.6);
  }
  h2 { color: white; text-align: center; margin-bottom: 8px; }
  .sub { color: rgba(255,255,255,0.5); text-align: center; font-size: 13px; margin-bottom: 30px; }
  .form-group { margin-bottom: 18px; }
  label { display: block; color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 6px; }
  input { width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 12px 15px; color: white; font-size: 14px; outline: none; }
  input:focus { border-color: #4caf50; }
  .alert { padding: 12px; border-radius: 8px; margin-bottom: 18px; font-size: 14px; display: none; }
  .alert.error { background: rgba(220,53,69,0.2); border: 1px solid #dc3545; color: #ff6b7a; }
  .alert.success { background: rgba(40,167,69,0.2); border: 1px solid #28a745; color: #5fdd80; }
  .sq-display { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 15px; color: rgba(255,255,255,0.8); font-size: 14px; margin-bottom: 5px; }
  .btn { width: 100%; padding: 13px; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 700; transition: all 0.3s; margin-bottom: 10px; }
  .btn-red { background: linear-gradient(135deg, #dc3545, #a71d2a); color: white; }
  .btn-outline { background: transparent; border: 2px solid rgba(255,255,255,0.3); color: white; }
  .btn:hover { transform: translateY(-1px); }
  .step { display: none; }
  .step.active { display: block; }
</style>
</head>
<body>
<div class="card">
  <h2>🔑 Forgot Password</h2>
  <p class="sub">Reset your Grand Stay Hotel account password</p>
  <div id="alert" class="alert"></div>

  <!-- Step 1: Email -->
  <div class="step active" id="step1">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="your@email.com">
    </div>
    <button class="btn btn-red" onclick="searchEmail()">Search Email</button>
    <button class="btn btn-outline" onclick="window.location.href='index.html'">← Back to Login</button>
  </div>

  <!-- Step 2: Security Q&A + new password -->
  <div class="step" id="step2">
    <div class="form-group">
      <label>Security Question</label>
      <div class="sq-display" id="sqDisplay">—</div>
    </div>
    <div class="form-group">
      <label>Your Answer</label>
      <input type="text" id="answer" placeholder="Enter your answer">
    </div>
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="newPassword" placeholder="New password">
    </div>
    <button class="btn btn-red" onclick="resetPassword()">Reset Password</button>
    <button class="btn btn-outline" onclick="window.location.href='index.html'">← Back to Login</button>
  </div>
</div>

<script>
const API = 'https://hotelmanagement1-production.up.railway.app/api';
let foundEmail = '';

function showAlert(msg, type) {
  const a = document.getElementById('alert');
  a.textContent = msg;
  a.className = `alert ${type}`;
  a.style.display = 'block';
}

async function searchEmail() {
  const email = document.getElementById('email').value.trim();
  if (!email) { showAlert('Enter your email address.', 'error'); return; }
  
  // We'll check via a simple approach using customer login check
  // For forgot password, we'd need a dedicated endpoint
  // Here we'll just show a mock flow since backend needs extending
  showAlert('Password reset functionality requires the backend /api/customer/forgot endpoint. See README for details.', 'error');
  
  // If backend endpoint exists, use this:
  // const res = await fetch(`${API}/customer/check-email?email=${encodeURIComponent(email)}`);
}

function resetPassword() {
  const answer = document.getElementById('answer').value.trim();
  const newPw = document.getElementById('newPassword').value;
  if (!answer || !newPw) { showAlert('Fill in all fields.', 'error'); return; }
  showAlert('Password reset requires backend endpoint. See README.', 'error');
}
</script>
</body>
</html>
